<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackathon Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fa-solid fa-chart-pie"></i> Smart Spend Analytics</h1>
            <p>Hackathon Intermediate Edition</p>
        </header>

        <section class="dashboard">
            <div class="card total-balance">
                <h3>Total Budget</h3>
                <p id="budget-display">$0.00</p>
            </div>
            <div class="card total-expenses">
                <h3>Total Spent</h3>
                <p id="expense-display">$0.00</p>
            </div>
            <div class="card remaining-funds">
                <h3>Remaining</h3>
                <p id="balance-display">$0.00</p>
            </div>
        </section>

        <section class="analytics-panel">
            <div class="chart-container">
                <h3><i class="fa-solid fa-chart-donut"></i> Spending Habits Breakdown</h3>
                <canvas id="expenseChart"></canvas>
            </div>
        </section>

        <div class="main-content">
            <div class="input-panel">
                <div class="panel-card">
                    <h3><i class="fa-solid fa-gear"></i> Set Budget</h3>
                    <div class="inline-form">
                        <input type="number" id="budget-input" placeholder="Enter total budget">
                        <button id="set-budget-btn">Set</button>
                    </div>
                </div>

                <div class="panel-card">
                    <h3><i class="fa-solid fa-plus"></i> Add Expense</h3>
                    <form id="expense-form">
                        <div class="form-group">
                            <label for="exp-title">Title</label>
                            <input type="text" id="exp-title" placeholder="e.g., Cloud Hosting" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="exp-amount">Amount ($)</label>
                                <input type="number" id="exp-amount" step="0.01" placeholder="0.00" required>
                            </div>
                            <div class="form-group">
                                <label for="exp-category">Category</label>
                                <select id="exp-category">
                                    <option value="Food">Food</option>
                                    <option value="Software">Software</option>
                                    <option value="Hardware">Hardware</option>
                                    <option value="Marketing">Marketing</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn-submit">Add Transaction</button>
                    </form>
                </div>
            </div>

            <div class="ledger-panel">
                <div class="ledger-header">
                    <h3><i class="fa-solid fa-list"></i> History</h3>
                    <div class="filter-group">
                        <select id="filter-category">
                            <option value="All">All Categories</option>
                            <option value="Food">Food</option>
                            <option value="Software">Software</option>
                            <option value="Hardware">Hardware</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Amount</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="expense-list">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
